name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.name }} release package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: dist:mac
            artifact: macos-release
          - name: Windows
            os: windows-latest
            command: dist:win
            artifact: windows-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts
      - name: Build desktop package
        working-directory: desktop
        run: npm run ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Verify macOS release artifacts
        if: runner.os == 'macOS'
        run: ./desktop/scripts/verify-macos-artifacts.sh
      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: release-assets
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
